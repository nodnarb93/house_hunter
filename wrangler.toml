name = "house-hunter"
compatibility_date = "2024-11-01"
pages_build_output_dir = "./dist"

# Cron: run pipeline every 6 hours (UTC). Up to 3 triggers allowed on free tier.
[triggers]
crons = ["0 */6 * * *"]

# D1 database (create with: wrangler d1 create house_hunter_db)
# Then add database_id here and run: wrangler d1 execute house_hunter_db --remote --file=./migrations/0000_initial.sql
[[d1_databases]]
binding = "DB"
database_name = "house_hunter_db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"
